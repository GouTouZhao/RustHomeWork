syntax = "proto3";

package newblog.admin;

import "sdkws.proto";

option go_package = "github.com/GouTouZhao/BlogNew/internal/protocol/admin;protoadmin";

message PushBlogNewReq {
    newblog.sdkws.UserRequestBase base = 1;
    string title = 2;
    string content = 3;
    string cover_image = 4;
    string category_id = 5;
}

message PushBlogNewResp {
    string article_id = 1;
}

message DeleteBlogReq {
    newblog.sdkws.UserRequestBase base = 1;
    string article_id = 2;
}

message DeleteBlogResp {
}

message PostBlogChangeReq {
    newblog.sdkws.UserRequestBase base = 1;
    string article_id = 2;
    string title = 3;
    string content = 4;
    string cover_image = 5;
    string category_id = 6;
}

message PostBlogChangeResp {
}

service Admin {
  rpc PushBlogNew(PushBlogNewReq) returns (PushBlogNewResp);
  rpc DeleteBlog(DeleteBlogReq) returns (DeleteBlogResp);
  rpc PostBlogChange(PostBlogChangeReq) returns (PostBlogChangeResp);
}