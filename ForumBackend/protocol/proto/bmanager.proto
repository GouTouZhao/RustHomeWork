// ===== йПИеґЕеІЯзАєж∞ЂзЃЯ =====

service BManager {
    // зТЗеЛЃоЖСзї†пЉДжВК
    rpc PushForumCommentNew(PushForumCommentNewReq) returns (PushForumCommentNewResp);
    rpc DeleteComment(DeleteCommentReq) returns (DeleteCommentResp);

    // зТБеУДжљІзФѓж†ІзУЩзї†пЉДжВК (жµ†?forum йНЪе†ЭиЛЯ)
    rpc PushForumNew(PushForumNewReq) returns (PushForumNewResp);
    rpc DeleteForum(DeleteForumReq) returns (DeleteForumResp);
    rpc UpdateForum(UpdateForumReq) returns (UpdateForumResp);

    // OSS йН•еЙІеҐЦзї†пЉДжВК (жµ†?image жЭ©дљЇ–©)
    rpc GetOssKey(GetOssKeyReq) returns (GetOssKeyResp);
    rpc GetImageUrl(GetImageUrlReq) returns (GetImageUrlResp);
}