apiVersion: apps/v1
kind: Deployment
metadata:
  name: forum-api-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: forum-api
  template:
    metadata:
      labels:
        app: forum-api
    spec:
      containers:
        - name: forum-api
          image: goutouz/forum-api:latest
          env:
            - name: CONFIG_PATH
              value: "/config"
            # - name: IMENV_MYSQL_PASSWORD
            #   value: "${MYSQL_PASSWORD}"
            
          volumeMounts:
            - name: forum-config
              mountPath: /config
              readOnly: true
          ports:
            - containerPort: 8080
      
      volumes:
        - name: forum-config
          configMap:
            name: forum-config
