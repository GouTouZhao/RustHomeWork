package newblog.bmanager;

import "sdkws.proto";

option go_package = "github.com/GouTouZhao/BlogNew/internal/protocol/bmanager;protobmanager";

// ===== зТЗеЛЃоЖСзї†пЉДжВК (йНШ?bmanager) =====

message PushForumCommentNewReq {
    newblog.sdkws.UserRequestBase base = 1;
    string article_id = 2;
    string content = 3;
    bool is_reply = 4;
    string root_comment_id = 5;
    int64 reply_to_user_id = 6;
}

message PushForumCommentNewResp {
    string comment_id = 1;
}

message DeleteCommentReq {
    string comment_id = 1;
    int64 user_id = 2;
}

message DeleteCommentResp {
}

// ===== зТБеУДжљІзФѓж†ІзУЩзї†пЉДжВК (жµ†?forum йНЪе†ЭиЛЯ) =====

message PushForumNewReq {
    string title = 1;
    string content = 2;
    string cover_image = 3;
    int64 author_id = 4;
}

message PushForumNewResp {
    string article_id = 1;
}

message DeleteForumReq {
    string article_id = 1;
    int64 user_id = 2;
}

message DeleteForumResp {
}

message UpdateForumReq {
    string article_id = 1;
    string title = 2;
    string content = 3;
    string cover_image = 4;
    int64 user_id = 5;
}

message UpdateForumResp {
}

// ===== OSS йН•еЙІеҐЦзї†пЉДжВК (жµ†?image жЭ©дљЇ–©) =====

message GetOssKeyReq {
    newblog.sdkws.UserRequestBase base = 1;
    string file_ext = 2; // йПВеЫ¶жђҐйОµвХБзЭНйНЪ? jpg, png, webp зїЫ?
}

message GetOssKeyResp {
    string host = 1;              // OSS жґУе©БзіґйН¶жЭњжљГ
    string key = 2;               // йПВеЫ¶жђҐйН¶?OSS жґУоЕ†жЃСзТЇоИЪзЈЮ
    string policy = 3;            // Base64 зЉВж†ЂзИЬйР®?Policy
    string oss_access_key_id = 4; // AccessKeyId
    string signature = 5;         // зїЫжГІжВХ
    int64 expire = 6;             // жЭ©еЫ®жє°йПГе†Хж£њйОі?
    string security_token = 7;    // STS SecurityToken
}

message GetImageUrlReq {
    newblog.sdkws.UserRequestBase base = 1;
    string image_key = 2; // OSS жґУоЕ†жЃСйН•еЙІеҐЦзТЇоИЪзЈЮ
}

message GetImageUrlResp {
